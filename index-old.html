<head>
<meta charset="utf-8">

<style>
    body{
    font-family:Arial, sans-serif;
    background:#f4f7ff;
    padding:20px;
}

h1{
    color:#1a4fbf;
}

.filter-panel{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

.filter-grid{
    display:flex;
    gap:40px;
}

.filter-block{
    flex:1;
}

.add-panel{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

.search-input{
    width:350px;
}

input{
    padding:6px 10px;
    border-radius:6px;
    border:1px solid #ccc;
    margin:4px 0;
}

button{
    background:#2b6cff;
    border:none;
    color:white;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.item-card{
    background:white;
    border-radius:12px;
    padding:16px;
    margin:10px 0;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    width:92%;
    transition:transform .15s ease, box-shadow .15s ease;
}

.item-card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,0.12);
}

.item-info{
    flex-grow:1;
}

.item-title{
    font-size:18px;
    font-weight:600;
    color:#1a4fbf;
    display:flex;
    align-items:center;
    gap:6px;
}

.item-fields{
    margin-top:4px;
    color:#444;
    font-size:14px;
}

.item-actions{
    display:flex;
    gap:8px;
}

.remove-btn{
    background:#e53935;
}

.toggle-btn{
    background:none;
    border:none;
    color:#1a4fbf;
    cursor:pointer;
}
.tree-node{
    display:block;
}

.children-container{
    margin-left:20px;
}

.toggle-btn{
    background:none;
    border:none;
    font-size:14px;
    color:#1a4fbf;
    cursor:pointer;
    margin-right:6px;
}
</style>
</head>

<body>

<h1>Inventory</h1>

<button onclick="showTab('inventory')">Inventory</button>
<button onclick="showTab('borrowed')">Borrowed</button>
<button onclick="showTab('settings')">Settings</button>

<hr>

<div id="inventoryTab">

<div class="filter-panel">

<h2>Search</h2>

<input
    type="text"
    id="mainSearch"
    placeholder="Search by item name..."
    oninput="refresh()"
    class="search-input"
>

<div class="filter-grid">

<div class="filter-block">

<h4>Filter by class</h4>

<div id="classCheckboxes"></div>

</div>

<div class="filter-block">

<h4>Filter by type</h4>

<input
    type="text"
    id="typeFilterSearch"
    placeholder="Search type..."
    oninput="updateTypeSuggestions('typeFilter')"
>

<div id="typeFilterSuggestions"></div>

<div id="typeFilterDynamicFields"></div>

</div>

</div>

</div>


<h2>Add Item</h2>

<div class="add-panel">

<input id="itemName" placeholder="Name">

<input
    type="text"
    id="typeSearch"
    placeholder="Search type..."
    oninput="updateTypeSuggestions('type')"
>

<div id="typeSuggestions"></div>

<input
    type="text"
    id="classSearch"
    placeholder="Search class..."
    oninput="updateClassSuggestions()"
>

<div id="classSuggestions"></div>

<input
    type="text"
    id="parentSearch"
    placeholder="Search for parent..."
    oninput="updateParentSuggestions()"
>

<div id="parentSuggestions"></div>

<div id="typeDynamicFields"></div>

<button onclick="addItem()">Add Item</button>

</div>

<h2>Items</h2>

<div id="inventoryList"></div>

</div>

<div id="borrowedTab" style="display:none">

<h2>Borrowed Items</h2>

<input id="borrowedFriendSearch" placeholder="Friend ID" oninput="refreshBorrowed()">
<input id="borrowedItemSearch" placeholder="Item ID" oninput="refreshBorrowed()">

<div id="borrowedList"></div>

</div>

<div id="settingsTab" style="display:none">

<h2>Classes</h2>

<input id="newClass">
<button onclick="addClass()">Add Class</button>

<div id="classList"></div>

<h2>Types</h2>

<input id="newTypeName" placeholder="Type name">

<div id="newTypeFields"></div>

<button onclick="addFieldInput()">Add field</button>
<button onclick="createNewType()">Create Type</button>

<div id="typeList"></div>

</div>

<script src="renderer.js"></script>

</body>
